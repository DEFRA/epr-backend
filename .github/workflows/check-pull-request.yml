name: Check Pull Request

on:
  pull_request:
    branches:
      - '*'
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  pr-prep:
    name: Preparation
    runs-on: ubuntu-latest
    outputs:
      docs-only: ${{ steps.check.outputs.docs-only }}
    steps:
      - name: Prepare PR
        uses: DEFRA/epr-re-ex-service/.github/actions/pr-preparation@main

      - name: Check for docs-only changes
        id: check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const docsOnly = files.length > 0 && files.every(file => file.filename.endsWith('.md'));

            core.setOutput('docs-only', docsOnly);
            console.log(`Documentation-only changes: ${docsOnly}`);
            console.log(`Changed files: ${files.map(f => f.filename).join(', ')}`)

  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    needs: pr-prep
    if: needs.pr-prep.outputs.docs-only != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Test and Scan
        uses: DEFRA/epr-re-ex-service/.github/actions/test-and-scan@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}

      - name: Cache MongoDB binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}-7.0.14
          restore-keys: |
            mongodb-binaries-${{ runner.os }}-

  type-check-prod:
    name: Lint Types - Prod
    runs-on: ubuntu-latest
    needs: pr-prep
    if: needs.pr-prep.outputs.docs-only != 'true'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: DEFRA/epr-re-ex-service/.github/actions/lint-types@main
        with:
          npm-script: lint:types
          tsconfig: jsconfig.typecheck.json
          label: Prod
          comment-header: lint-types-prod
          fail-on: all

  type-check-tests:
    name: Lint Types - Tests
    runs-on: ubuntu-latest
    needs: pr-prep
    if: needs.pr-prep.outputs.docs-only != 'true'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: DEFRA/epr-re-ex-service/.github/actions/lint-types@main
        with:
          fail-on: all

  typecheck-burndown:
    name: Typecheck strictness burndown
    runs-on: ubuntu-latest
    needs: pr-prep
    if: needs.pr-prep.outputs.docs-only != 'true'
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: DEFRA/epr-re-ex-service/.github/actions/typecheck-burndown@main

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: pr-prep
    if: needs.pr-prep.outputs.docs-only != 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate

  test-journey:
    name: Run Journey Tests (waste-record-states=${{ matrix.waste-record-states }})
    runs-on: ubuntu-latest
    needs: pr-prep
    if: needs.pr-prep.outputs.docs-only != 'true'
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        waste-record-states: [true]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check for matching journey test branch
        id: journey-branch
        run: |
          BRANCH="${{ github.head_ref }}"
          if git ls-remote --heads https://github.com/DEFRA/epr-re-ex-journey-tests.git "$BRANCH" | grep -q .; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Record build start time
        id: build-timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - run: docker build -t defradigital/epr-backend:${{github.sha}} .

      - name: Record test start time
        id: test-timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Run journey tests on ${{ steps.journey-branch.outputs.ref }}
        uses: DEFRA/epr-re-ex-journey-tests/run-journey-tests@main
        with:
          epr-backend: ${{github.sha}}
          branch: ${{ steps.journey-branch.outputs.ref }}
          waste-record-states: ${{ matrix.waste-record-states }}
          artifact-suffix: -waste-record-states-${{ matrix.waste-record-states }}
          test-scope: all

      - name: Write journey test summary
        if: always()
        uses: DEFRA/epr-re-ex-service/.github/actions/journey-test-summary@main
        with:
          build-start: ${{ steps.build-timer.outputs.start }}
          test-start: ${{ steps.test-timer.outputs.start }}

  journey-tests:
    name: Run Journey Tests
    runs-on: ubuntu-latest
    needs: test-journey
    if: always()
    steps:
      - name: Check journey test results
        run: |
          RESULT="${{ needs.test-journey.result }}"
          if [ "$RESULT" = "failure" ] || [ "$RESULT" = "cancelled" ]; then
            echo "Journey tests reported '$RESULT'"
            exit 1
          fi
          echo "Journey tests reported '$RESULT'"
