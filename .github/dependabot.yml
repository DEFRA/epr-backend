version: 2

updates:
  # Update npm packages
  - package-ecosystem: npm
    directory: /
    open-pull-requests-limit: 10

    # Group packages into shared PR
    groups:
      dev:
        applies-to: 'version-updates'
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'

      prod:
        applies-to: 'version-updates'
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'

      security:
        applies-to: 'security-updates'
        patterns:
          - '*'

      other:
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'

    # Schedule run nightly
    schedule:
      interval: "cron"
      cronjob: "0 0 * * *"

    cooldown:
      default-days: 3

    versioning-strategy: increase

    allow:
      # Include direct package.json updates
      - dependency-type: direct

    ignore:
      # global-agent 4.x and undici 8.x break the service (reverted in #1327);
      # hold both on their current major line until the breakage is resolved.
      - dependency-name: global-agent
        update-types:
          - version-update:semver-major
      - dependency-name: undici
        update-types:
          - version-update:semver-major

  # Update GitHub Actions
  - package-ecosystem: github-actions
    directory: /

    # Schedule run nightly
    schedule:
      interval: "cron"
      cronjob: "0 0 * * *"

    cooldown:
      default-days: 3
